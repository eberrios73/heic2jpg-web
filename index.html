<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEIC to JPG Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .drop-zone {
      border: 2px dashed #475569;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 15px;
    }

    .drop-zone:hover {
      border-color: #64748b;
      background: #1a2332;
    }

    .drop-zone.dragover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      color: #93c5fd;
    }

    .drop-zone .icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }

    .drop-zone .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
    }

    .progress-area {
      margin-top: 20px;
      display: none;
    }

    .progress-area.visible { display: block; }

    progress {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      appearance: none;
      -webkit-appearance: none;
    }

    progress::-webkit-progress-bar {
      background: #334155;
      border-radius: 4px;
    }

    progress::-webkit-progress-value {
      background: #22c55e;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .status {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 8px;
    }

    .terminal {
      margin-top: 20px;
      background: #0c0c0c;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #4ade80;
      height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }

    .terminal.visible { display: block; }

    .terminal .info { color: #38bdf8; }
    .terminal .error { color: #f87171; }
    .terminal .ok { color: #4ade80; }
    .terminal .warn { color: #fbbf24; }
    .terminal .dim { color: #64748b; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #475569;
    }

    .footer a {
      color: #64748b;
      text-decoration: none;
    }

    .footer a:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#x1F5BC; HEIC to JPG Converter</h1>
    <p class="subtitle">
      Drop HEIC/HEIF images or a ZIP file containing them.
      They'll be converted to JPG and returned as a ZIP download.
    </p>

    <div id="dropZone" class="drop-zone">
      <span class="icon">&#x1F4E4;</span>
      Drag and drop files here, or click to browse
      <div class="hint">Accepts .heic, .heif, and .zip files</div>
      <input type="file" id="fileInput" multiple accept=".heic,.heif,.zip" hidden>
    </div>

    <div id="progressArea" class="progress-area">
      <progress id="progressBar" value="0" max="100"></progress>
      <div id="status" class="status">Ready</div>
    </div>

    <div id="terminal" class="terminal"></div>

    <div class="footer">
      heic2jpg-web &mdash; powered by libheif + ImageMagick + ffmpeg
    </div>
  </div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const progressArea = document.getElementById('progressArea');
const progressBar = document.getElementById('progressBar');
const statusEl = document.getElementById('status');
const terminal = document.getElementById('terminal');

function log(msg, cls) {
  const span = document.createElement('span');
  span.className = cls || '';
  span.textContent = msg + '\n';
  terminal.appendChild(span);
  terminal.scrollTop = terminal.scrollHeight;
}

// Drop zone events
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files);
  if (files.length) startConversion(files);
});

dropZone.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files);
  if (files.length) startConversion(files);
});

function startConversion(files) {
  // Reset
  terminal.innerHTML = '';
  terminal.classList.add('visible');
  progressArea.classList.add('visible');
  progressBar.value = 0;
  statusEl.textContent = 'Uploading...';
  dropZone.querySelector('.icon').textContent = '\u23F3';
  dropZone.querySelector('.icon').nextSibling.textContent = ' Converting, please wait...';

  const totalSize = files.reduce((s, f) => s + f.size, 0);
  const totalMB = (totalSize / 1024 / 1024).toFixed(1);

  log('$ heic2jpg --upload', 'dim');
  log('[UPLOAD] ' + files.length + ' file(s) selected (' + totalMB + ' MB)', 'info');
  files.forEach(f => {
    log('[UPLOAD] \u2192 ' + f.name + ' (' + (f.size / 1024 / 1024).toFixed(1) + ' MB)', 'info');
  });
  log('[UPLOAD] Uploading to server...', 'info');

  const formData = new FormData();
  for (const file of files) {
    formData.append('heicFiles[]', file, file.name);
  }

  let lastPctLogged = 0;
  const xhr = new XMLHttpRequest();

  xhr.upload.addEventListener('progress', (e) => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      progressBar.value = pct;
      const uploadedMB = (e.loaded / 1024 / 1024).toFixed(1);
      statusEl.textContent = pct < 100 ? 'Uploading... ' + pct + '%' : 'Upload complete. Converting...';

      if (pct >= lastPctLogged + 10 || pct === 100) {
        log('[UPLOAD] ' + pct + '% (' + uploadedMB + ' / ' + totalMB + ' MB)', 'info');
        lastPctLogged = pct;
      }
      if (pct >= 100) {
        log('[UPLOAD] Upload complete. Waiting for server...', 'ok');
        log('---', 'dim');
      }
    }
  });

  xhr.addEventListener('load', () => {
    if (xhr.status === 200) {
      const text = xhr.responseText;
      const lines = text.split('\n').filter(l => l.trim());

      lines.forEach(line => {
        if (line.startsWith('[DOWNLOAD]')) return;
        let cls = '';
        if (line.includes('[INFO]')) cls = 'info';
        else if (line.includes('[OK]') || line.includes('OK')) cls = 'ok';
        else if (line.includes('[ERROR]') || line.includes('FAIL')) cls = 'error';
        else if (line.includes('[WARN]') || line.includes('failed')) cls = 'warn';
        else if (line === '---') cls = 'dim';
        log(line, cls);
      });

      const downloadLine = lines.find(l => l.startsWith('[DOWNLOAD]'));
      if (downloadLine) {
        const url = downloadLine.replace('[DOWNLOAD] ', '').trim();
        const a = document.createElement('a');
        a.href = url;
        a.download = 'converted_images.zip';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        statusEl.textContent = 'Done! Download started.';
        progressBar.value = 100;
        log('', '');
        log('[DONE] Download started!', 'ok');
      } else if (lines.some(l => l.includes('[ERROR]'))) {
        statusEl.textContent = 'Conversion had errors. See log.';
      }
    } else {
      log('[ERROR] Server returned HTTP ' + xhr.status, 'error');
      statusEl.textContent = 'Error';
    }
    resetDropZone();
  });

  xhr.addEventListener('error', () => {
    log('[ERROR] Network error.', 'error');
    statusEl.textContent = 'Error';
    resetDropZone();
  });

  xhr.open('POST', 'heic_convert.php');
  xhr.send(formData);
}

function resetDropZone() {
  dropZone.querySelector('.icon').textContent = '\uD83D\uDCE4';
  dropZone.querySelector('.icon').nextSibling.textContent = ' Drag and drop files here, or click to browse';
  fileInput.value = '';
}
</script>
</body>
</html>
